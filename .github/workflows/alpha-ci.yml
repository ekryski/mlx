name: alpha CI

# Builds and tests the Metal backend on the ekryski fork's `alpha` branch
# and any PR targeting it. The Metal kernels are compiled by `mlx-metallib`
# as part of the main target, so a green build here exercises the full
# kernel pipeline.
#
# Note: doctest cases that gate on `gpu::is_available()` are no-ops on
# GitHub-hosted macOS runners (no Apple GPU exposed to CI VMs). They still
# compile, link, and resolve all symbols — the build is the load-bearing
# signal for kernel-level changes. GPU runtime tests run locally.

on:
  push:
    branches: [alpha]
  pull_request:
    branches: [alpha]

permissions:
  contents: read

concurrency:
  group: alpha-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/alpha' }}

jobs:
  build:
    if: github.repository_owner == 'ekryski'
    name: Build (M1 macOS)
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          xcodebuild -version
          cmake --version
          uname -a

      - name: Cache CMake build directory
        uses: actions/cache@v5
        with:
          path: build
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'mlx/backend/metal/CMakeLists.txt', 'mlx/backend/metal/kernels/**/*.metal', 'mlx/backend/metal/kernels/**/*.h') }}
          restore-keys: |
            cmake-${{ runner.os }}-

      - name: Configure
        # Examples (linear_regression, logistic_regression, tutorial, ...) each
        # link the full libmlx and add 5-10 min of build time without
        # contributing CI signal. Disable.
        run: |
          cmake -S . -B build \
            -DMLX_BUILD_TESTS=ON \
            -DMLX_BUILD_EXAMPLES=OFF \
            -DMLX_BUILD_PYTHON_BINDINGS=OFF

      - name: Build (libmlx + metallib + tests)
        # Cap parallelism at 2 on the 3-vCPU / 7 GB macos-26 runner. C++ template
        # instantiation in the steel/attn kernels peaks at >2 GB per job — three
        # concurrent compilers blow past 7 GB and trigger swap, which is *much*
        # slower than a 2-job run. -j 2 finishes faster end-to-end.
        run: cmake --build build -j 2

      - name: Verify build artifacts
        run: |
          test -f build/libmlx.a
          test -f build/mlx.metallib || test -f build/mlx/backend/metal/kernels/mlx.metallib
          echo "libmlx.a: $(stat -f '%z' build/libmlx.a) bytes"
          ls -la build/*.metallib build/mlx/backend/metal/kernels/*.metallib 2>/dev/null | head

      - name: Run unit tests
        run: ./build/tests/tests
